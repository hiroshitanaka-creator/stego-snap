<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Storm Omega - Ultimate Privacy Door</title>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <script src="https://unpkg.com/gifuct-js"></script> <!-- 最新gifuct-js！！ -->
    <style>
        /* お前のフルスタイルコピペしろ！！ 省略で本質集中 */
        body { background: #1e1e2e; color: #e0e0e0; padding: 20px; font-family: sans-serif; }
        canvas { max-width: 100%; border: 2px solid #a78bfa; background: #000; border-radius: 10px; }
        button { padding: 15px; background: #a78bfa; color: #1e1e2e; border: none; border-radius: 10px; cursor: pointer; margin: 10px 0; }
        #decoded-text { font-size: 1.5em; color: #60efff; margin: 20px 0; }
    </style>
</head>
<body>
    <!-- お前のUI全部コピペ！！ エンコード部分はそのまま！！ -->
    <!-- デコード部分だけOmega強化！！ -->

    <script>
        // お前のエンコード関数そのまま！！ (generateAnimatedPrismや改造版コピペ)

        // Omegaデコード！！ 甘さゼロ！！
        async function decodePrismStormOmega() {
            const file = document.getElementById('gif-file-input').files[0]; // お前のIDに合わせろ！！
            if (!file) return alert('GIF選べ！！ 甘えんな！！');

            const arrayBuffer = await file.arrayBuffer();
            const gif = decompressFrames(parseGIF(arrayBuffer), true); // 全フレーム正確デコンプレス！！

            if (gif.length < 2) return alert('ヘッダーねえ！！ 無効！！');

            // ヘッダーから色マップ抽出 + 平均色補正ベース
            const headerCanvas = document.createElement('canvas');
            headerCanvas.width = gif[0].dims.width;
            headerCanvas.height = gif[0].dims.height;
            const headerCtx = headerCanvas.getContext('2d');
            const headerImg = headerCtx.createImageData(headerCanvas.width, headerCanvas.height);
            headerImg.data.set(gif[0].patch);
            headerCtx.putImageData(headerImg, 0, 0);

            const recoveredColorMap = {};
            const digits = '0123456789abcdef';
            const colorSamples = {}; // 色補正用平均

            for (let i = 0; i < 16; i++) {
                const sampleX = i * 31 + 14;
                const sampleY = headerCanvas.height - 60;
                const pixel = headerCtx.getImageData(sampleX, sampleY, 1, 1).data;
                const rawColor = `#${pixel[0].toString(16).padStart(2,'0')}${pixel[1].toString(16).padStart(2,'0')}${pixel[2].toString(16).padStart(2,'0')}`.toUpperCase();
                recoveredColorMap[rawColor] = digits[i];
                colorSamples[digits[i]] = {r: pixel[0], g: pixel[1], b: pixel[2], count: 1};
            }

            // 全フレーム色平均補正（圧縮ブレ対策！！）
            for (let f = 1; f < gif.length; f++) {
                const frameCanvas = document.createElement('canvas');
                frameCanvas.width = gif[f].dims.width;
                frameCanvas.height = gif[f].dims.height;
                const fCtx = frameCanvas.getContext('2d');
                const fImg = fCtx.createImageData(frameCanvas.width, frameCanvas.height);
                fImg.data.set(gif[f].patch);
                fCtx.putImageData(fImg, 0, 0);

                for (let i = 0; i < 16; i++) {
                    const sampleX = i * 31 + 14;
                    const sampleY = frameCanvas.height - 60;
                    if (sampleX < frameCanvas.width && sampleY < frameCanvas.height) {
                        const pixel = fCtx.getImageData(sampleX, sampleY, 1, 1).data;
                        const d = digits[i];
                        if (colorSamples[d]) {
                            colorSamples[d].r += pixel[0];
                            colorSamples[d].g += pixel[1];
                            colorSamples[d].b += pixel[2];
                            colorSamples[d].count++;
                        }
                    }
                }
            }

            // 補正マップ作成
            const correctedMap = {};
            digits.split('').forEach(d => {
                const avg = colorSamples[d];
                if (avg) {
                    const avgColor = `#${Math.round(avg.r / avg.count).toString(16).padStart(2,'0')}${Math.round(avg.g / avg.count).toString(16).padStart(2,'0')}${Math.round(avg.b / avg.count).toString(16).padStart(2,'0')}`.toUpperCase();
                    correctedMap[avgColor] = d;
                }
            });

            // 位置探索投票（甘さゼロ！！ 周囲±30px検索！！）
            const gridSize = 20; // 20x20グリッド仮定
            const searchRadius = 30; // 変形耐性！！ 回転・ワープ対応！！
            const votes = Array(gridSize * gridSize).fill().map(() => ({}));

            for (let f = 1; f < gif.length; f++) {
                const frameCanvas = document.createElement('canvas');
                frameCanvas.width = gif[f].dims.width;
                frameCanvas.height = gif[f].dims.height;
                const fCtx = frameCanvas.getContext('2d');
                const fImg = fCtx.createImageData(frameCanvas.width, frameCanvas.height);
                fImg.data.set(gif[f].patch);
                fCtx.putImageData(fImg, 0, 0);

                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col < gridSize; col++) {
                        const idx = row * gridSize + col;
                        const baseX = col * 25 + 12.5; // 中心
                        const baseY = row * 25 + 80 + 12.5; // データ領域

                        let bestDigit = null;
                        let bestScore = 0;

                        for (let dx = -searchRadius; dx <= searchRadius; dx += 5) {
                            for (let dy = -searchRadius; dy <= searchRadius; dy += 5) {
                                const x = baseX + dx;
                                const y = baseY + dy;
                                if (x < 0 || y < 0 || x >= frameCanvas.width || y >= frameCanvas.height) continue;

                                const pixel = fCtx.getImageData(x, y, 1, 1).data;
                                const color = `#${pixel[0].toString(16).padStart(2,'0')}${pixel[1].toString(16).padStart(2,'0')}${pixel[2].toString(16).padStart(2,'0')}`.toUpperCase();

                                let digit = correctedMap[color] || Object.keys(correctedMap).find(k => colorDistance(k, color) < 30); // 色距離許容！！ ブレ耐性！！
                                if (digit) {
                                    const score = 100 - colorDistance(correctedMap[digit] ? getColorFromDigit(digit) : color, color);
                                    if (score > bestScore) {
                                        bestScore = score;
                                        bestDigit = digit;
                                    }
                                }
                            }
                        }

                        if (bestDigit) {
                            votes[idx][bestDigit] = (votes[idx][bestDigit] || 0) + (bestScore / 100);
                        }
                    }
                }
            }

            // 最終多数決 + 信頼度
            let finalHex = '';
            let totalConfidence = 0;
            votes.forEach((vote, idx) => {
                if (Object.keys(vote).length > 0) {
                    const best = Object.keys(vote).reduce((a, b) => vote[a] > vote[b] ? a : b);
                    finalHex += best;
                    totalConfidence += vote[best] / (gif.length - 1); // フレーム平均
                }
            });

            // UTF-16デコード
            let decoded = '';
            for (let i = 0; i < finalHex.length; i += 4) {
                const hex = finalHex.substr(i, 4);
                if (hex.length === 4) decoded += String.fromCharCode(parseInt(hex, 16));
            }

            const confidence = Math.round((totalConfidence / votes.length) * 100) || 0;

            document.getElementById('decoded-text').textContent = decoded || '完全失敗！！ ノイズ強すぎorAIに破られた！！';
            document.getElementById('decoded-text').textContent += `\n信頼度: ${confidence}% (80%超えなきゃ信用すんな！！)`;
        }

        // 補助: 色距離計算（ブレ耐性！！）
        function colorDistance(c1, c2) {
            const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
            const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
            return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
        }

        function getColorFromDigit(d) {
            // correctedMap逆引き簡易
            return Object.keys(correctedMap).find(k => correctedMap[k] === d) || '#000000';
        }
    </script>
</body>
</html>
